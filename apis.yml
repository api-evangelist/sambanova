aid: sambanova
name: SambaNova
description: >-
  SambaNova Systems designs the SN-series Reconfigurable Dataflow Unit (RDU)
  AI chips and operates SambaCloud, a managed inference platform serving
  open-source models including the DeepSeek, Llama, Gemma, MiniMax, and
  gpt-oss families. The SambaCloud API is OpenAI-compatible and is consumed
  through first-party Python and TypeScript SDKs as well as the SambaNova
  AI Starter Kit collection on GitHub. SambaNova additionally ships
  SambaStack as an integrated chips-to-model on-prem appliance, SambaManaged
  managed services, and SambaRack rack-scale systems. The company emphasizes
  sovereign AI partnerships in Australia, Europe, and the UK and a recently
  announced heterogeneous inference collaboration with Intel.
type: Index
position: Provider
access: 3rd-Party
